<style>
    body { margin:0; background:#1a1a1a; color:white; font-family:sans-serif; text-align:center; }
    .container { display:flex; flex-direction:column; align-items:center; width:100%; }
    img { max-width:100%; margin-bottom:2px; }
    .nav-buttons { padding:20px; display:flex; gap:10px; justify-content:center; }
    button { background:#3390ec; border:none; padding:10px 20px; border-radius:8px; color:white; }
</style>
</head>

<body>

<div id="reader" class="container"></div>

<div class="nav-buttons">
    <button onclick="window.scrollTo(0,0)">Наверх!</button>
    <button onclick="tg.close()">Закрыть</button>

// ------------------------------
// Recieving manga ID
// ------------------------------
const params = new URLSearchParams(window.location.search);
const mangaId = params.get("manga");

if (!epicDB[mangaId]) {
    document.body.innerHTML = "<h1>Error: we don't have this here</h1>";
    throw new Error("Unknown manga ID");
}

const pages = epicDB[mangaId].pages;

// ------------------------------
// Page download
// ------------------------------
const reader = document.getElementById("reader");

pages.forEach(src => {
    let img = document.createElement("img");
    img.src = src;
    img.loading = "lazy";
    reader.appendChild(img);
});
