        @font-face {
    font-family: 'TTOctosquares-Medium';
    src: url('fonts/TTOctosquares-Medium.woff2') format('woff2'),
         url('fonts/TTOctosquares-Medium.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
    }

    body { margin:0; background:#121212; color:white; font-family:TTOctosquares-Medium; }
    h1 { text-align:center; padding:20px; }

        * {
    font-family: 'TTOctosquares-Medium', TTOctosquares-Medium !important;
    }

    .container {
        display:flex;
        flex-direction:column;
        align-items:center;
        width:100%;
    }

    .page-block {
        width: 100%;
        text-align: center;
        margin-bottom: 25px;
    }

    .page-number {
        color: #ffffff;
        font-size: 17px;
        margin-top: 2px;
    }

    img {
        max-width: 100%;
        margin-bottom: 15px;
        border-radius: 6px;
    }

    /* Плавающие кнопки */
    .floating-btn {
        position: fixed;
        bottom: 20px;
        left: 20px;
        width: 54px;
        height: 54px;
        background: #ca61ff;
        color: white;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 28px;
        cursor: pointer;
        opacity: 0;
        transform: scale(0.6);
        pointer-events: none;
        transition: opacity .25s ease, transform .25s ease;
        z-index: 3000;
    }

    .floating-btn.show {
        opacity: 1;
        transform: scale(1);
        pointer-events: auto;
    }

    .home-btn {
        width: auto;
        height: auto;
        padding: 12px 18px;
        font-size: 16px;
        border-radius: 10px;
    }

    .page-block img {
    box-shadow: 0 4px 18px rgba(0, 0, 0, 0.25);
    border-radius: 4px;
    background: #111;
    }

    .page-block img {
    width: 100%;
    max-width: 900px;
    height: auto;
    display: block;
    margin: 0 auto;
}

</style>
</head>

// ------------------------------
// Получаем ID манги
// ------------------------------
const params = new URLSearchParams(window.location.search);
const mangaId = params.get("manga");

if (!epicDB[mangaId]) {
    document.body.innerHTML = "<h1>Error: No such manga</h1>";
    throw new Error("Unknown manga ID");
}

const pages = epicDB[mangaId].pages;

// ------------------------------
// Загружаем страницы
// ------------------------------
const reader = document.getElementById("reader");

pages.forEach((src, index) => {

    const block = document.createElement("div");
    block.className = "page-block";

    const num = document.createElement("div");
    num.className = "page-number";
    num.textContent = `${index + 1}`;

    const img = document.createElement("img");
    img.src = src;
    img.loading = "lazy";

    block.appendChild(img);
    block.appendChild(num);

    reader.appendChild(block);
});

// ------------------------------
// Плавающие кнопки
// ------------------------------
window.addEventListener("scroll", () => {
    if (window.scrollY > 250) {
        btnUp.classList.add("show");
        btnHome.classList.remove("show");
    } else {
        btnUp.classList.remove("show");
        btnHome.classList.add("show");
    }
});

</script>

<!-- Плавающая кнопка вверх -->
<div id="btnUp" class="floating-btn">↑</div>

<!-- Плавающая кнопка меню -->
<div id="btnHome" class="floating-btn home-btn">Назад в меню!</div>

<script>
// кнопка вверх
btnUp.onclick = () => {
    window.scrollTo({ top: 0, behavior: 'smooth' });
};

// кнопка меню
btnHome.onclick = () => {
    window.location.href = "index.html";
};
</script>
