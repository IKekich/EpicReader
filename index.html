<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Epic Reader</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
    body { margin:0; background:#121212; color:white; font-family:sans-serif; }
    h1 { text-align:center; padding:20px; }

    .grid {
        display:grid;
        grid-template-columns:repeat(auto-fill, minmax(140px,1fr));
        gap:16px;
        padding:20px;
    }

    .card {
        background:#1e1e1e;
        border-radius:12px;
        overflow:hidden;
        cursor:pointer;
        transition:.25s;
    }

    .card:hover {
        transform:scale(1.05);
    }

    .card img {
        width:100%;
        height:210px;
        object-fit:cover;
    }

    .title {
        padding:10px;
        text-align:center;
        font-size:14px;
    }

    /* ---------------- ВСПЛЫВАШКА ------------------- */

    .popup {
        position:fixed;
        inset:0;
        background:rgba(0,0,0,0.75);
        display:none;
        justify-content:center;
        align-items:center;
        padding:20px;
        z-index:1000;
    }

    .popup-content {
        background:#1e1e1e;
        border-radius:16px;
        max-width:420px;
        width:100%;
        padding:20px;
        text-align:center;
        animation:scaleIn .25s ease;
    }

    @keyframes scaleIn {
        from { transform:scale(0.85); opacity:0; }
        to   { transform:scale(1); opacity:1; }
    }

    .popup img {
        width:70%;
        border-radius:12px;
        margin-bottom:15px;
    }

    .popup button {
        width:100%;
        background:#3390ec;
        border:none;
        padding:12px 20px;
        border-radius:8px;
        color:white;
        cursor:pointer;
        margin-top:10px;
    }

    .popup .close-btn {
        background:#444;
    }

    a {
        color:#77c8ff;
    }

</style>
</head>

<body>

<h1>Make your choice...</h1>

<div class="grid" id="grid"></div>

<div class="popup" id="popup">
    <div class="popup-content" id="popupContent">
        <img id="popupImg">

        <h2 id="popupTitle"></h2>
        <p><b>Автор:</b> <span id="popupAuthor"></span></p>
        <p><b>Оригинал:</b> <a id="popupSource" target="_blank"></a></p>
        <p><b>Перевод загружен:</b> <span id="popupDate"></span></p>

        <button id="readBtn">Читать</button>
        <button class="close-btn" onclick="closePopup()">Закрыть</button>
    </div>
</div>

<script>
// База данных манги с доп. информацией
const mangaList = [
    {
        id: "lear",
        title: "Nine Sols: The Way of Lear (Путь Ли Эра)",
        cover: "https://raw.githubusercontent.com/IKekich/EpicReader/main/thumbnails/Путь%20Ли%20Эра.png",
        author: "RedCandleGames",
        source: "https://www.redcandlegames.com/",
        date: "28.03.2026"
    }
];

const grid = document.getElementById("grid");
const popup = document.getElementById("popup");

// Генерация карточек
mangaList.forEach((m, index) => {
    let card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `<img src="${m.cover}" alt="${m.title}">
        <div class="title">${m.title}</div>
    `;

    card.onclick = () => openPopup(index);
    grid.appendChild(card);
});

// Открытие окошка
function openPopup(i) {
    const m = mangaList[i];

    document.getElementById("popupImg").src = m.cover;
    document.getElementById("popupTitle").textContent = m.title;
    document.getElementById("popupAuthor").textContent = m.author;

    const src = document.getElementById("popupSource");
    src.href = m.source;
    src.textContent = m.source;

    document.getElementById("popupDate").textContent = m.date;

    document.getElementById("readBtn").onclick = () => {
        window.location.href = `reader.html?manga=${m.id}`;
    };

    popup.style.display = "flex";
}

// Закрытие окошка
function closePopup() {
    popup.style.display = "none";
}
</script>

</body>
</html>
