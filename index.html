<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manga Menu</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
    body { margin:0; background:#121212; color:white; font-family:sans-serif; }
    h1 { text-align:center; padding:20px; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(140px,1fr)); gap:16px; padding:20px; }
    .card { background:#1e1e1e; border-radius:12px; overflow:hidden; cursor:pointer; transition:.25s; }
    .card:hover { transform:scale(1.05); }
    .card img { width:100%; height:210px; object-fit:cover; }
    .title { padding:10px; text-align:center; font-size:14px; }
</style>
</head>

<body>

<h1>Make your choice...</h1>

<div class="grid" id="grid"></div>

<script>
const mangaList = [
    {
        id: "epic",
        title: "Nine Sols: The Way of Lear (Путь Ли Эра)",
        cover: "https://raw.githubusercontent.com/IKekich/EpicReader/refs/heads/main/thumbnails/Путь%20Ли%20Эра.png"
    }
];

//Card generating
const grid = document.getElementById("grid");

mangaList.forEach(m => {
    let card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
        ${m.cover}
        <div class="title">${m.title}</div>
    `;
    card.onclick = () => {
        window.location.href = `reader.html?manga=${m.id}`;
    };
    grid.appendChild(card);
});
</script>

</body>
</html>
