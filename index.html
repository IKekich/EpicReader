<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Epic Reader</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

    @font-face {
    font-family: 'TTOctosquares-Medium';
    src: url('fonts/TTOctosquares-Medium.woff2') format('woff2'),
         url('fonts/TTOctosquares-Medium.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
    }

    body { margin:0; background:#121212; color:white; font-family:TTOctosquares-Medium; }
    h1 { text-align:center; padding:20px; }

        * {
    font-family: 'TTOctosquares-Medium', TTOctosquares-Medium !important;
    }

    .grid {
        display:grid;
        grid-template-columns:repeat(auto-fill, minmax(140px,1fr));
        gap:16px;
        padding:20px;
    }

    .card {
        background:#1e1e1e;
        border-radius:12px;
        overflow:hidden;
        cursor:pointer;
        transition:.25s;
    }

    .card:hover {
        transform:scale(1.05);
    }

    .card img {
        width:100%;
        height:210px;
        object-fit:cover;
    }

    .title {
        padding:10px;
        text-align:center;
        font-size:14px;
    }

    /* ---------------- ВСПЛЫВАШКА ------------------- */

    .popup {
        position:fixed;
        inset:0;
        background:rgba(0,0,0,0.75);
        display:none;
        justify-content:center;
        align-items:center;
        padding:20px;
        z-index:1000;
    }

    .popup-content {
        background:#1e1e1e;
        border-radius:16px;
        max-width:420px;
        width:100%;
        padding:20px;
        text-align:center;
        animation:scaleIn .25s ease;
    }

    @keyframes scaleIn {
        from { transform:scale(0.85); opacity:0; }
        to   { transform:scale(1); opacity:1; }
    }

    .popup img {
        width:70%;
        border-radius:12px;
        margin-bottom:15px;
    }

    .popup button {
        width:100%;
        background:#ca61ff;
        border:none;
        padding:12px 20px;
        border-radius:8px;
        color:white;
        cursor:pointer;
        margin-top:10px;
    }

    .popup .close-btn {
        background:#444;
    }

    a {
        color:#ca61ff;
    }


    /* ---------------- LAST.FM NOW PLAYING ------------------- */

    .now-playing {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: #222;
        color: white;
        padding: 10px 14px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        gap: 12px;
        z-index: 9999;
        opacity: 1;
        transform: translateY(0);
        transition: opacity .25s ease, transform .25s ease;
        font-size: 14px;
    }

    .now-playing.hidden {
        opacity: 0;
        transform: translateY(20px);
        pointer-events: none;
    }

    .now-playing img {
        width: 48px;
        height: 48px;
        border-radius: 8px;
        object-fit: cover;
    }

    .np-info {
        display: flex;
        flex-direction: column;
    }

    .np-title {
        font-weight: bold;
        font-size: 13px;
        opacity: 0.7;
    }

    /* ==== NOW PLAYING ==== */

    .now-playing-box {
        position: fixed;
        bottom: 16px;
        right: 16px;
        background: #2b2b2b;
        color: white;
        padding: 10px 14px;
        border-radius: 14px;
        display: flex;
        align-items: center;
        gap: 12px;
        box-shadow: 0 4px 14px rgba(0,0,0,0.35);
        z-index: 9999;
        opacity: 1;
        transform: translateY(0);
        transition: opacity .25s ease, transform .25s ease;
        max-width: 260px;
        font-size: 14px;
    }

    .now-playing-box.hidden {
        opacity: 0;
        transform: translateY(12px);
        pointer-events: none;
    }

    .now-playing-box img {
        width: 50px;
        height: 50px;
        border-radius: 10px;
        object-fit: cover;
    }

    .np-meta {
        display: flex;
        flex-direction: column;
        flex-grow: 1;
    }

    .np-title {
        font-weight: 600;
        margin-bottom: 3px;
    }

    .np-sub {
        opacity: 0.7;
        font-size: 12px;
    }

    .np-btn {
        margin-top: 6px;
        padding: 6px 10px;
        border-radius: 8px;
        font-size: 12px;
        text-align: center;
        background: #ca61ff;
        color: white;
        cursor: pointer;
    }

        /* Анимация плеера */
    .np-playing {
        animation: pulse 1.8s infinite ease-in-out;
    }

    @keyframes pulse {
        0%   { transform: scale(1); }
        50%  { transform: scale(1.06); }
        100% { transform: scale(1); }
    }

    /* Список последних треков */
    .np-list {
        margin-top: 10px;
        font-size: 12px;
        opacity: 0.8;
        display: flex;
        flex-direction: column;
        gap: 3px;
    }

    .np-list-item {
        display: flex;
        flex-direction: column;
    }


    .np-label {
        position: fixed;
        right: 20px;
        color: #aaa;
        font-size: 13px;
        z-index: 10001;
        transition: opacity .25s ease, transform .25s ease;
    }


.np-label.hidden {
    opacity: 0;
    transform: translateY(10px);
    pointer-events: none;
    }

</style>
</head>

<body>

<h1>Make your choice...</h1>

<div class="grid" id="grid"></div>

<div class="popup" id="popup">
    <div class="popup-content" id="popupContent">
        <img id="popupImg">

        <h2 id="popupTitle"></h2>
        <p><b>Автор:</b> <span id="popupAuthor"></span></p>
        <p><b>Оригинал:</b> <a id="popupSource" target="_blank"></a></p>
        <p><b>Перевод загружен:</b> <span id="popupDate"></span></p>

        <button id="readBtn">Читать!</button>
        <button class="close-btn" onclick="closePopup()">Закрыть</button>
    </div>
</div>

<script>
// База данных манги
const mangaList = [
    {
        id: "lear",
        title: "Nine Sols: The Way of Lear (Путь Ли Эра)",
        cover: "https://raw.githubusercontent.com/IKekich/EpicReader/main/thumbnails/Путь%20Ли%20Эра.png",
        author: "RedCandleGames",
        source: "https://mojoin.com/comics/224#chapter",
        date: "31.05.2025"
    }
];

const grid = document.getElementById("grid");
const popup = document.getElementById("popup");

mangaList.forEach((m, index) => {
    let card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
    <img src="${m.cover}" alt="${m.title}">
    <div class="title">${m.title}</div>
    `;

    card.onclick = () => openPopup(index);
    grid.appendChild(card);
});

function openPopup(i) {
    const m = mangaList[i];

    document.getElementById("popupImg").src = m.cover;
    document.getElementById("popupTitle").textContent = m.title;
    document.getElementById("popupAuthor").textContent = m.author;

    const src = document.getElementById("popupSource");
    src.href = m.source;
    src.textContent = m.source;

    document.getElementById("popupDate").textContent = m.date;

    document.getElementById("readBtn").onclick = () => {
        window.location.href = `reader.html?manga=${m.id}`;
    };

    popup.style.display = "flex";
}

function closePopup() {
    popup.style.display = "none";
}


/* ---------------- LAST.FM NOW PLAYING ------------------- */

async function updateNowPlaying() {
    const username = "Kekichg";
    const apiKey = "051909ee039c572aafb4285cdef0cfc5";

    const url = `https://ws.audioscrobbler.com/2.0/?method=user.getrecenttracks&user=${username}&api_key=${apiKey}&format=json&limit=5`;

    try {
        const res = await fetch(url);
        const data = await res.json();

        const tracks = data.recenttracks.track;
        const current = tracks[0];

        const artist = current.artist["#text"];
        const title = current.name;

        // Нормальная загрузка обложки (64px)
        const cover =
            current.image?.[1]?.["#text"] ||
            current.image?.[0]?.["#text"] ||
            "";

        const trackUrl = current.url;
        const isPlaying = current['@attr']?.nowplaying === "true";

        const subText = isPlaying
            ? "Сейчас играет"
            : formatLocalTime(current.date?.uts);

        const box = document.getElementById("nowPlayingBox");
        const label = document.getElementById("npLabel");
        const coverEl = document.getElementById("npCover");

        // Обложка + текст
        document.getElementById("npCover").src = cover;
        document.getElementById("npTitle").textContent = `${artist} — ${title}`;
        document.getElementById("npSub").textContent = subText;

        // Кнопка открытия
        document.getElementById("npBtn").onclick = () => window.open(trackUrl, "_blank");

        // Пульсация
        if (isPlaying) {
            coverEl.classList.add("np-playing");
            box.style.background = "#444";
        } else {
            coverEl.classList.remove("np-playing");
            box.style.background = "#2b2b2b";
        }

        box.classList.remove("hidden");
label.classList.remove("hidden");

requestAnimationFrame(() => {
    requestAnimationFrame(() => {
        const boxRect = box.getBoundingClientRect();
        label.style.bottom = (window.innerHeight - boxRect.top + 15) + "px";
    });
    
    });

        const boxRect = box.getBoundingClientRect();
        label.style.bottom = (window.innerHeight - boxRect.top + 15) + "px";

    } catch (err) {
        console.error("Last.fm error:", err);
    }

}

// первый запуск
updateNowPlaying();

// каждые 30 секунд
setInterval(updateNowPlaying, 30000);

function formatLocalTime(uts) {
    const date = new Date(uts * 1000);

    return date.toLocaleString([], {
        year: "numeric",
        month: "short",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit"
    });
}

</script>

<div id="npLabel" class="np-label hidden">+ MY RECENT SONG +</div>

<div id="nowPlayingBox" class="now-playing-box hidden">
    <img id="npCover">
    <div class="np-meta">
        <div id="npTitle" class="np-title"></div>

        <div id="npSub" class="np-sub"></div>

        <div id="npList" class="np-list"></div>

        <div id="npBtn" class="np-btn">Открыть в Lasf.fm</div>
    </div>
</div>

</body>
</html>
