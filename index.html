<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Epic Reader</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
    body { margin:0; background:#121212; color:white; font-family:sans-serif; }
    h1 { text-align:center; padding:20px; }

    .grid {
        display:grid;
        grid-template-columns:repeat(auto-fill, minmax(140px,1fr));
        gap:16px;
        padding:20px;
    }

    .card {
        background:#1e1e1e;
        border-radius:12px;
        overflow:hidden;
        cursor:pointer;
        transition:.25s;
    }

    .card:hover {
        transform:scale(1.05);
    }

    .card img {
        width:100%;
        height:210px;
        object-fit:cover;
    }

    .title {
        padding:10px;
        text-align:center;
        font-size:14px;
    }

    /* ---------------- ВСПЛЫВАШКА ------------------- */

    .popup {
        position:fixed;
        inset:0;
        background:rgba(0,0,0,0.75);
        display:none;
        justify-content:center;
        align-items:center;
        padding:20px;
        z-index:1000;
    }

    .popup-content {
        background:#1e1e1e;
        border-radius:16px;
        max-width:420px;
        width:100%;
        padding:20px;
        text-align:center;
        animation:scaleIn .25s ease;
    }

    @keyframes scaleIn {
        from { transform:scale(0.85); opacity:0; }
        to   { transform:scale(1); opacity:1; }
    }

    .popup img {
        width:70%;
        border-radius:12px;
        margin-bottom:15px;
    }

    .popup button {
        width:100%;
        background:#3390ec;
        border:none;
        padding:12px 20px;
        border-radius:8px;
        color:white;
        cursor:pointer;
        margin-top:10px;
    }

    .popup .close-btn {
        background:#444;
    }

    a {
        color:#77c8ff;
    }


    /* ---------------- LAST.FM NOW PLAYING ------------------- */

    .now-playing {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: #222;
        color: white;
        padding: 10px 14px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        gap: 12px;
        z-index: 9999;
        opacity: 1;
        transform: translateY(0);
        transition: opacity .25s ease, transform .25s ease;
        font-size: 14px;
    }

    .now-playing.hidden {
        opacity: 0;
        transform: translateY(20px);
        pointer-events: none;
    }

    .now-playing img {
        width: 48px;
        height: 48px;
        border-radius: 8px;
        object-fit: cover;
    }

    .np-info {
        display: flex;
        flex-direction: column;
    }

    .np-title {
        font-weight: bold;
        font-size: 13px;
        opacity: 0.7;
    }

    /* ==== NOW PLAYING (Telegram-style) ==== */

    .now-playing-box {
        position: fixed;
        bottom: 16px;
        right: 16px;
        background: #2b2b2b;
        color: white;
        padding: 10px 14px;
        border-radius: 14px;
        display: flex;
        align-items: center;
        gap: 12px;
        box-shadow: 0 4px 14px rgba(0,0,0,0.35);
        z-index: 9999;
        opacity: 1;
        transform: translateY(0);
        transition: opacity .25s ease, transform .25s ease;
        max-width: 260px;
        font-size: 14px;
    }

    .now-playing-box.hidden {
        opacity: 0;
        transform: translateY(12px);
        pointer-events: none;
    }

    .now-playing-box img {
        width: 50px;
        height: 50px;
        border-radius: 10px;
        object-fit: cover;
    }

    .np-meta {
        display: flex;
        flex-direction: column;
        flex-grow: 1;
    }

    .np-title {
        font-weight: 600;
        margin-bottom: 3px;
    }

    .np-sub {
        opacity: 0.7;
        font-size: 12px;
    }

    .np-btn {
        margin-top: 6px;
        padding: 6px 10px;
        border-radius: 8px;
        font-size: 12px;
        text-align: center;
        background: #3390ec;
        color: white;
        cursor: pointer;
    }

</style>
</head>

<body>

<h1>Make your choice...</h1>

<div class="grid" id="grid"></div>

<div class="popup" id="popup">
    <div class="popup-content" id="popupContent">
        <img id="popupImg">

        <h2 id="popupTitle"></h2>
        <p><b>Автор:</b> <span id="popupAuthor"></span></p>
        <p><b>Оригинал:</b> <a id="popupSource" target="_blank"></a></p>
        <p><b>Перевод загружен:</b> <span id="popupDate"></span></p>

        <button id="readBtn">Читать!</button>
        <button class="close-btn" onclick="closePopup()">Закрыть</button>
    </div>
</div>

<!-- ---- Плашка Last.fm ---- -->
<div id="nowPlaying" class="now-playing hidden">
    <img id="npCover">
    <div class="np-info">
        <div class="np-title">Сейчас играет</div>
        <div id="npArtist"></div>
        <div id="npTrack"></div>
    </div>
</div>


<script>
// База данных манги
const mangaList = [
    {
        id: "lear",
        title: "Nine Sols: The Way of Lear (Путь Ли Эра)",
        cover: "https://raw.githubusercontent.com/IKekich/EpicReader/main/thumbnails/Путь%20Ли%20Эра.png",
        author: "RedCandleGames",
        source: "https://mojoin.com/comics/224#chapter",
        date: "31.05.2025"
    }
];

const grid = document.getElementById("grid");
const popup = document.getElementById("popup");

mangaList.forEach((m, index) => {
    let card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
        ${m.cover}
        <div class="title">${m.title}</div>
    `;

    card.onclick = () => openPopup(index);
    grid.appendChild(card);
});

function openPopup(i) {
    const m = mangaList[i];

    document.getElementById("popupImg").src = m.cover;
    document.getElementById("popupTitle").textContent = m.title;
    document.getElementById("popupAuthor").textContent = m.author;

    const src = document.getElementById("popupSource");
    src.href = m.source;
    src.textContent = m.source;

    document.getElementById("popupDate").textContent = m.date;

    document.getElementById("readBtn").onclick = () => {
        window.location.href = `reader.html?manga=${m.id}`;
    };

    popup.style.display = "flex";
}

function closePopup() {
    popup.style.display = "none";
}


/* ---------------- LAST.FM NOW PLAYING ------------------- */

async function checkNowPlaying() {
    const username = "Kekichg";
    const apiKey = "051909ee039c572aafb4285cdef0cfc5";

    const url = `https://ws.audioscrobbler.com/2.0/?method=user.getrecenttracks&user=${username}&api_key=${apiKey}&format=json&limit=1`;

    try {
        const res = await fetch(url);
        const data = await res.json();

        const track = data.recenttracks.track[0];

        const isPlaying = track['@attr']?.nowplaying === "true";

        const box = document.getElementById("nowPlaying");

        if (!isPlaying) {
            box.classList.add("hidden");
            return;
        }

        // Если играет
        document.getElementById("npArtist").textContent = track.artist["#text"];
        document.getElementById("npTrack").textContent = track.name;

        const img = track.image?.[2]?.["#text"] || "";
        document.getElementById("npCover").src = img;

        box.classList.remove("hidden");

    } catch (err) {
        console.error("Last.fm error:", err);
    }
}

// Первый вызов
checkNowPlaying();

// Автообновление каждые 30 сек
setInterval(checkNowPlaying, 30000);

async function updateNowPlaying() {
    const username = "Kekichg";
    const apiKey = "051909ee039c572aafb4285cdef0cfc5";

    const url = `https://ws.audioscrobbler.com/2.0/?method=user.getrecenttracks&user=${username}&api_key=${apiKey}&format=json&limit=1`;

    try {
        const res = await fetch(url);
        const data = await res.json();

        const track = data.recenttracks.track[0];
        const artist = track.artist["#text"];
        const title = track.name;
        const cover = track.image?.[3]?.["#text"]; // 300x300
        const trackUrl = track.url;

        const isPlaying = track['@attr']?.nowplaying === "true";

        const subText = isPlaying
            ? "Сейчас играет"
            : track.date?.["#text"] ?? "";

        const box = document.getElementById("nowPlayingBox");

        document.getElementById("npCover").src = cover;
        document.getElementById("npTitle").textContent = `${artist} — ${title}`;
        document.getElementById("npSub").textContent = subText;

        const btn = document.getElementById("npBtn");
        btn.onclick = () => window.open(trackUrl, "_blank");

        // Стили под Telegram Player
        box.style.background = isPlaying ? "#3a82f7" : "#2b2b2b";
        box.style.color = "white";

        box.classList.remove("hidden");

    } catch (err) {
        console.error("Last.fm error:", err);
    }
}

// первый запуск
updateNowPlaying();

// обновление каждые 30 секунд
setInterval(updateNowPlaying, 30000);

</script>

<div id="nowPlayingBox" class="now-playing-box hidden">
    <img id="npCover">
    <div class="np-meta">
        <div id="npTitle" class="np-title"></div>
        <div id="npSub" class="np-sub"></div>
        <div id="npBtn" class="np-btn">Открыть</div>
    </div>
</div>

</body>
</html>
